name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.8", "3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install r2rome with dev dependencies
        run: |
          pip install -e ".[dev]"

      - name: Run tests
        # Graphviz binary is not installed in CI — tests that need it are mocked.
        # This validates graceful degradation as well as pure-Python paths.
        run: |
          pytest --cov=r2rome --cov-report=term-missing

      - name: Install graphviz and run render tests
        # Run a second pass with graphviz available to exercise the render path
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y graphviz
          pytest tests/test_render.py -v

  example-render:
    name: Example renders successfully
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install r2rome and graphviz
        run: |
          pip install -e .
          sudo apt-get install -y graphviz
      - name: Render example and verify output files exist
        run: |
          r2rome render examples/platform-rewrite.yaml -o /tmp/example-out/
          test -f /tmp/example-out/index.html
          test -f /tmp/example-out/infra.html
          test -f /tmp/example-out/backend.html
          test -f /tmp/example-out/frontend.html
          test -f /tmp/example-out/be_data.html

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev tools
        run: pip install ruff
      - name: Ruff check
        run: ruff check src/ tests/
