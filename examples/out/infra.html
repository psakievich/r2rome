    :root {
      --bg:     #0d0f14;

    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    nav .brand {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-right: 8px;
      text-decoration: none;
    }
    nav .crumb { color: var(--muted); }
    nav .crumb a { color: var(--muted); text-decoration: none; }
    nav .crumb a:hover { color: var(--accent); }
    nav .crumb.current { color: var(--text); }
    nav .sep { color: var(--muted); opacity: 0.4; }

    /* ── BACK BUTTON ── */
    .back-bar {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .back-bar a {
      color: var(--muted);
      text-decoration: none;
    }
    .back-bar a:hover { color: var(--accent); }

    /* ── GRAPH AREA ── */
    main {
      flex: 1;
      padding: 20px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }
    .svg-wrapper {
      flex: 1;
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      cursor: grab;
    }
    .svg-wrapper:active { cursor: grabbing; }
    .svg-wrapper svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    #controls {
      position: absolute; bottom: 12px; left: 16px;
      display: flex; gap: 6px;
    }
    #controls button {
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 14px;
      width: 28px; height: 28px;
      cursor: pointer;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
    }
    #controls button:hover { color: var(--accent); border-color: var(--accent); }
    #hint {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 9px; color: var(--muted); text-align: right;
      line-height: 1.8; pointer-events: none;
    }

    /* ── FOOTER ── */
    footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
