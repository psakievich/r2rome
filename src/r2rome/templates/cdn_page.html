<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — r2rome (interactive)</title>
  <!-- CDN dependencies — requires network access -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
  <style>
    :root {
      --bg:     #0d0f14;
      --panel:  #13161e;
      --border: #1e2330;
      --accent: #4af0c4;
      --muted:  #4a5570;
      --text:   #c8d0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      flex-shrink: 0;
    }
    nav .brand { color: var(--accent); font-weight: 700; font-size: 13px; margin-right: 8px; }
    nav .crumb { color: var(--muted); }
    nav .crumb a { color: var(--muted); text-decoration: none; }
    nav .crumb a:hover { color: var(--accent); }
    nav .crumb.current { color: var(--text); }
    nav .sep { color: var(--muted); opacity: 0.4; }
    .back-bar {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      flex-shrink: 0;
    }
    .back-bar a { color: var(--muted); text-decoration: none; }
    .back-bar a:hover { color: var(--accent); }
    main { flex: 1; position: relative; overflow: hidden; }
    #graph-svg { width: 100%; height: 100%; }
    #hint {
      position: absolute; bottom: 12px; right: 16px;
      font-size: 9px; color: var(--muted); text-align: right;
      line-height: 1.8; pointer-events: none;
    }
    footer {
      padding: 8px 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<nav>
  <span class="brand">r2rome</span>
  {% for crumb in breadcrumb %}
    {% if not loop.last %}
      <span class="crumb"><a href="{{ crumb.href }}">{{ crumb.label }}</a></span>
      <span class="sep">/</span>
    {% else %}
      <span class="crumb current">{{ crumb.label }}</span>
    {% endif %}
  {% endfor %}
</nav>

{% if parent_href %}
<div class="back-bar"><a href="{{ parent_href }}">← back</a></div>
{% endif %}

<main>
  <svg id="graph-svg"></svg>
  <div id="hint">Scroll to zoom · Drag to pan</div>
</main>

<footer>generated by r2rome · interactive mode (CDN) · the road to Rome wasn't built in a day</footer>

<script>
// Graph data injected by html_writer
const GRAPH_DATA = {{ graph_json | safe }};

// Minimal dagre-d3 renderer — same logic as the standalone HTML tool
// but driven by pre-processed graph data from Python rather than raw YAML
(function render() {
  const svg    = d3.select('#graph-svg');
  const width  = document.querySelector('main').clientWidth;
  const height = document.querySelector('main').clientHeight;

  const dg = new dagre.graphlib.Graph();
  dg.setGraph({ rankdir: 'LR', marginx: 40, marginy: 40, nodesep: 50, ranksep: 70 });
  dg.setDefaultEdgeLabel(() => ({}));

  const canvas = document.createElement('canvas');
  const ctx    = canvas.getContext('2d');
  ctx.font     = '11px JetBrains Mono, monospace';

  (GRAPH_DATA.nodes || []).forEach(n => {
    const w = Math.max(ctx.measureText(n.label || n.name).width + 48, 120);
    dg.setNode(n.name, { label: n.label || n.name, width: w, height: 44, data: n });
  });

  (GRAPH_DATA.edges || []).forEach(e => {
    dg.setEdge(e.from, e.to, {
      label: e.label || '',
      style: e.blocks ? 'stroke: #f06a6a; stroke-dasharray: 5,3;' : '',
    });
  });

  dagre.layout(dg);

  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  dg.nodes().forEach(id => {
    const n = dg.node(id);
    minX = Math.min(minX, n.x - n.width/2);
    minY = Math.min(minY, n.y - n.height/2);
    maxX = Math.max(maxX, n.x + n.width/2);
    maxY = Math.max(maxY, n.y + n.height/2);
  });
  const gw    = maxX - minX + 80;
  const gh    = maxY - minY + 80;
  const scale = Math.min(1, Math.min(width/gw, height/gh));
  const tx    = (width  - gw*scale)/2 - minX*scale + 40*scale;
  const ty    = (height - gh*scale)/2 - minY*scale + 40*scale;

  const root = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.1, 4])
    .on('zoom', e => root.attr('transform', e.transform));
  svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));

  // Edges
  dg.edges().forEach(e => {
    const ed  = dg.edge(e);
    const pts = ed.points;
    const line = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);
    const isBlock = ed.style && ed.style.includes('f06a6a');
    root.append('defs').append('marker')
      .attr('id', `arr-${e.v}-${e.w}`)
      .attr('markerWidth', 8).attr('markerHeight', 8)
      .attr('refX', 6).attr('refY', 3).attr('orient', 'auto')
      .append('polygon').attr('points', '0 0, 8 3, 0 6')
      .attr('fill', isBlock ? '#f06a6a' : '#2a3050');
    root.append('path')
      .attr('d', line(pts))
      .attr('stroke', isBlock ? '#f06a6a' : '#2a3050')
      .attr('stroke-dasharray', isBlock ? '5,3' : 'none')
      .attr('stroke-width', 1.5).attr('fill', 'none')
      .attr('marker-end', `url(#arr-${e.v}-${e.w})`);
  });

  // Nodes
  dg.nodes().forEach(id => {
    const dn   = dg.node(id);
    const data = dn.data;
    const STATUS_COLORS = {
      done:    { fill: '#0f2e22', stroke: '#3dcf8e', text: '#3dcf8e' },
      active:  { fill: '#092820', stroke: '#4af0c4', text: '#4af0c4' },
      todo:    { fill: '#151b29', stroke: '#3a4460', text: '#7b8baa' },
      blocked: { fill: '#2a1212', stroke: '#f06a6a', text: '#f06a6a' },
    };
    const col = STATUS_COLORS[data.status] || STATUS_COLORS.todo;
    const g_node = root.append('g')
      .attr('transform', `translate(${dn.x - dn.width/2},${dn.y - dn.height/2})`)
      .style('cursor', data.href ? 'pointer' : 'default')
      .on('click', () => { if (data.href) window.location.href = data.href; });
    g_node.append('rect')
      .attr('width', dn.width).attr('height', dn.height)
      .attr('rx', 6).attr('ry', 6)
      .attr('fill', col.fill).attr('stroke', col.stroke).attr('stroke-width', 1.5);
    g_node.append('text')
      .attr('x', dn.width/2).attr('y', dn.height/2 + 4)
      .attr('text-anchor', 'middle').attr('dominant-baseline', 'middle')
      .attr('font-family', 'JetBrains Mono, monospace')
      .attr('font-size', 11).attr('fill', col.text)
      .text(data.label || data.name);
  });
})();
</script>
</body>
</html>
