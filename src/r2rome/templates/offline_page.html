<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — r2rome</title>
  <style>
    :root {
      --bg:     #0d0f14;
      --panel:  #13161e;
      --border: #1e2330;
      --accent: #4af0c4;
      --muted:  #4a5570;
      --text:   #c8d0e0;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── NAV ── */
    nav {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    nav .brand {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      margin-right: 8px;
      text-decoration: none;
    }
    nav .crumb { color: var(--muted); }
    nav .crumb a { color: var(--muted); text-decoration: none; }
    nav .crumb a:hover { color: var(--accent); }
    nav .crumb.current { color: var(--text); }
    nav .sep { color: var(--muted); opacity: 0.4; }

    /* ── BACK BUTTON ── */
    .back-bar {
      padding: 8px 20px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
    }
    .back-bar a {
      color: var(--muted);
      text-decoration: none;
    }
    .back-bar a:hover { color: var(--accent); }

    /* ── GRAPH AREA ── */
    main {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 16px;
      letter-spacing: 0.04em;
    }
    .svg-wrapper {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      overflow: auto;
    }
    .svg-wrapper svg {
      max-width: 100%;
      height: auto;
    }

    /* ── FOOTER ── */
    footer {
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: var(--muted);
      text-align: right;
    }
  </style>
</head>
<body>

<nav>
  <span class="brand">r2rome</span>
  {% for crumb in breadcrumb %}
    {% if not loop.last %}
      <span class="crumb"><a href="{{ crumb.href }}">{{ crumb.label }}</a></span>
      <span class="sep">/</span>
    {% else %}
      <span class="crumb current">{{ crumb.label }}</span>
    {% endif %}
  {% endfor %}
</nav>

{% if parent_href %}
<div class="back-bar">
  <a href="{{ parent_href }}">← back</a>
</div>
{% endif %}

<main>
  <h1>{{ title }}</h1>
  <div class="svg-wrapper">
    {{ svg_content | safe }}
  </div>
</main>

<footer>generated by r2rome · the road to Rome wasn't built in a day</footer>

</body>
</html>
